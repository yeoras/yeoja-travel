<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIOR | Rain Specialist</title>
    <style>
        /* 기본 레이아웃 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #050811; /* 딥 차콜 블루 */
            overflow: hidden; /* 스크롤 방지 */
        }

        /* 1. 배경: 비 오는 질감 + 먼 보케 이미지 */
        .hero {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* 실제 배경 이미지 레이어 */
        .hero-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1498612721510-184566f116e9?q=80&w=2070'); /* 빗방울+먼 보케 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15; /* 은은하게 질감만 보이도록 투명도 조절 */
            z-index: -1;
        }

        /* 2. 상단 헤더 */
        header {
            position: absolute; 
            top: 0; 
            width: 100%; 
            padding: 40px 60px;
            display: flex; 
            justify-content: flex-start; /* 로고만 왼쪽 정렬 */
            align-items: center;
            z-index: 10;
        }
        
        /* 세련된 로고 구성 */
        .logo { 
            font-size: 32px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            letter-spacing: 2px;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo:hover { opacity: 0.8; }
        
        .logo-icon {
            width: 38px;
            height: 38px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 3. 중앙 슬로건 및 버튼 */
        .content { 
            text-align: center; 
            z-index: 10;
        }
        
        h1 { 
            font-size: 56px; 
            font-weight: 400; /* 너무 무겁지 않은 세련된 무게 */
            margin-bottom: 35px; 
            letter-spacing: -2px; /* 촘촘한 간격 */
            color: #ffffff;
            line-height: 1.1;
        }
        
        /* 프로스테드 유리 버튼 */
        .btn-main {
            display: inline-block;
            padding: 18px 45px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.12); /* 무광 유리 질감 */
            color: #ffffff; 
            text-decoration: none;
            font-size: 17px; 
            font-weight: 500;
            backdrop-filter: blur(12px); /* 프로스테드 효과 핵심 */
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease; 
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        /* 버튼 위에 은은한 무광 빛 효과 */
        .btn-main::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-main:hover { 
            background: rgba(255, 255, 255, 0.22); 
            border: 1px solid rgba(255, 255, 255, 0.6);
            transform: translateY(-3px) scale(1.03); 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        .btn-main:hover::after {
            top: 0%; left: 0%;
            width: 100%; height: 100%;
        }

        /* 4. 하단 카피라이트 */
        footer { 
            position: absolute; 
            bottom: 30px; 
            width: 100%;
            text-align: center;
            font-size: 13px; 
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4); /* 아주 은은하게 */
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-bg"></div> /* 배경 질감 레이어 */

        <header>
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" alt="FIOR Lens Icon">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2a10 10 0 0 1 10 10"></path>
                    <path d="M12 22a10 10 0 0 1-10-10"></path>
                </svg>
                FIOR
            </div>
            </header>

        <div class="content">
            <h1>빗길, 당신의 선명한 시야.</h1>
            <a href="#" class="btn-main">제품 알아보기</a>
        </div>

        <footer>© 2024 FIOR. Rain Specialist.</footer>
    </div>

</body>
</html>
