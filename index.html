<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIOR | Rain Specialist</title>
    <style>
        /* 기본 레이아웃 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Pretendard', -apple-system, sans-serif; }

        /* 1. 배경: 비 오는 창문 이미지 고정 */
        .hero {
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(10, 15, 25, 0.6), rgba(10, 15, 25, 0.6)), 
                        url('https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=2070') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            position: relative;
        }

        /* 2. 상단 헤더 */
        header {
            position: absolute; top: 0; width: 100%; padding: 40px 60px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; letter-spacing: 1px; }
        .point-box { 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px; border-radius: 25px; font-size: 14px; backdrop-filter: blur(10px);
        }

        /* 3. 중앙 텍스트 및 버튼 */
        .content { text-align: center; }
        h1 { font-size: 52px; font-weight: 300; margin-bottom: 30px; letter-spacing: -1px; }
        
        .btn-main {
            padding: 15px 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15); color: white; text-decoration: none;
            font-size: 16px; backdrop-filter: blur(10px); transition: 0.3s; cursor: pointer;
        }
        .btn-main:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        /* 4. 하단 카피라이트 */
        footer { position: absolute; bottom: 30px; font-size: 13px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="hero">
        <header>
            <div class="logo">👓 FIOR</div>
            <div class="point-box">🪙 300 P <</div>
        </header>

        <div class="content">
            <h1>빗길, 당신의 선명한 시야.</h1>
            <a href="#" class="btn-main">제품 알아보기</a>
        </div>

        <footer>© 2024 FIOR. Rain Specialist.</footer>
    </div>

</body>
</html>
